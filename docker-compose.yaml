services:

  # NER API — entity extraction (port 5002)

  ner-api:
    build: .
    command: python app/server/ner_server.py
    ports:
      - "5002:5002"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5002/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s


  # NEL API — entity linking to ESCO (port 5003)

  nel-api:
    build: .
    command: python app/server/nel_server.py
    ports:
      - "5003:5003"
    environment:
      - HF_TOKEN=${HF_TOKEN:-}
    volumes:
      - model-cache:/root/.cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5003/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

 
  # Classify API — orchestrator (port 5001)
  # Calls ner-api then nel-api, serves /v1/classify + batch endpoints
 
  classify-api:
    build: .
    command: python app/server/classify_server.py
    ports:
      - "5001:5001"
    environment:
      - NER_API_URL=http://ner-api:5002
      - NEL_API_URL=http://nel-api:5003
    depends_on:
      ner-api:
        condition: service_healthy
      nel-api:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5001/v1/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  
  # Change Stream Worker — watches MongoDB, feeds classify-api
  # Only runs if MONGODB_URI is set. Activate with:
  #   docker compose --profile with-mongodb up

  change-stream-worker:
    build: .
    command: python app/worker/change_stream_worker.py
    environment:
      - CLASSIFY_API_URL=http://classify-api:5001
      - APPLICATION_MONGODB_URI=${APPLICATION_MONGODB_URI:-}
      - APPLICATION_DATABASE_NAME=${APPLICATION_DATABASE_NAME:-horizon-scraper-dev}
    depends_on:
      classify-api:
        condition: service_healthy
    restart: unless-stopped
    profiles:
      - with-mongodb

volumes:
  model-cache:
