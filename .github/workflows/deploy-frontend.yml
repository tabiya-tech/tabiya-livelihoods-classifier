name: Deploy Frontends

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - "docs/**"
  workflow_dispatch:
    inputs:
      target:
        description: "Which frontend to deploy"
        required: true
        default: both
        type: choice
        options: [app, docs, both]

jobs:
  deploy-app:
    name: Deploy app → GCS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'app' || inputs.target == 'both') ||
      github.event_name == 'push' && contains(github.event.head_commit.modified, 'app/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install app dependencies
        working-directory: app
        run: npm ci

      - name: Build app
        working-directory: app
        run: npm run build
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to GCS
        run: gsutil -m rsync -r -d app/dist gs://app-classifier-tabiya-tech

  deploy-docs:
    name: Deploy docs → GCS
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' && (inputs.target == 'docs' || inputs.target == 'both') ||
      github.event_name == 'push' && contains(github.event.head_commit.modified, 'docs/')
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install docs dependencies
        working-directory: docs
        run: npm ci

      - name: Build docs
        working-directory: docs
        run: npm run build

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Deploy to GCS
        run: gsutil -m rsync -r -d docs/dist gs://docs-classifier-tabiya-tech
