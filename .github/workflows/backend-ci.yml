name: Backend CI

on:
  workflow_call:
    inputs:
      upload-artifacts:
        required: true
        type: boolean
        description: "Whether to build and push Docker images"
      stack:
        required: false
        type: string
        default: dev
        description: "Stack name (used as GitHub environment for secrets)"

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: ner
            needs_shared: false
          - service: nel
            needs_shared: true
          - service: classify
            needs_shared: false
          - service: nel_v2
            needs_shared: true
          - service: classify_v2
            needs_shared: false
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install shared
        if: matrix.needs_shared
        working-directory: backend/shared
        run: poetry install --no-root

      - name: Install dependencies
        run: poetry install --no-interaction
        working-directory: backend/${{ matrix.service }}

      - name: Run tests
        run: poetry run pytest
        working-directory: backend/${{ matrix.service }}

  build-and-push:
    name: Build & push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: inputs.upload-artifacts
    environment: ${{ inputs.stack }}
    strategy:
      matrix:
        service: [ner, nel, classify, nel_v2, classify_v2]
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tabiya-classifier"
          echo "${{ secrets.HF_TOKEN }}" > /tmp/hf_token
          docker build \
            -f backend/${{ matrix.service }}/Dockerfile \
            --secret id=HF_TOKEN,src=/tmp/hf_token \
            -t ${REGISTRY}/${{ matrix.service }}:${{ github.sha }} \
            -t ${REGISTRY}/${{ matrix.service }}:latest \
            .
          rm -f /tmp/hf_token

      - name: Push Docker image
        run: |
          REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tabiya-classifier"
          docker push ${REGISTRY}/${{ matrix.service }}:${{ github.sha }}
          docker push ${REGISTRY}/${{ matrix.service }}:latest
          echo "IMAGE=${REGISTRY}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
