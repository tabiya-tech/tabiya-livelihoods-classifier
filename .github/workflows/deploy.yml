name: Deploy

run-name: Deploy ${{ inputs.stack }} @ ${{ github.sha }}

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy (dev / staging / prod)"
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
  workflow_call:
    inputs:
      stack:
        required: true
        type: string
        description: "Stack to deploy"

jobs:
  deploy:
    name: Deploy ${{ inputs.stack }}
    runs-on: ubuntu-latest
    environment: ${{ inputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Python dependencies
        run: |
          pip install \
            -r iac/scripts/requirements.txt \
            -r iac/enable-services/requirements.txt \
            -r iac/auth/requirements.txt \
            -r iac/backend/requirements.txt \
            -r iac/frontend/requirements.txt \
            -r iac/common/requirements.txt \
            -r iac/aws-ns/requirements.txt

      - name: Install Pulumi CLI
        uses: pulumi/actions@v5

      - name: Login to Pulumi
        run: pulumi login
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # ── Prepare: fetch configs from GCP Secret Manager ─────────────────────
      - name: Prepare configs
        run: |
          REGISTRY="${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tabiya-classifier"
          python iac/scripts/prepare.py \
            --stack "${{ inputs.stack }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --ner-image   "${REGISTRY}/ner:${{ github.sha }}" \
            --nel-image   "${REGISTRY}/nel:${{ github.sha }}" \
            --classify-image "${REGISTRY}/classify:${{ github.sha }}"

      # ── Phase 1: deploy everything except frontend ─────────────────────────
      - name: Deploy infrastructure (pre-frontend)
        run: |
          for module in enable-services auth backend; do
            python iac/scripts/up.py --stack "${{ inputs.stack }}" --module "$module"
          done
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      # ── Phase 2: build frontends with real Firebase outputs ─────────────────
      - name: Get Firebase config from auth stack
        id: firebase
        run: |
          python - <<'EOF'
          import pulumi.automation as auto, os

          stack = auto.select_stack(
              stack_name="${{ inputs.stack }}",
              work_dir="iac/auth",
          )
          outputs = stack.outputs()
          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              f.write(f"api_key={outputs['firebase_api_key'].value}\n")
              f.write(f"project_id={outputs['firebase_project_id'].value}\n")
              f.write(f"auth_domain={outputs['firebase_auth_domain'].value}\n")
          EOF
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Build app
        run: yarn install --frozen-lockfile && yarn build
        working-directory: app
        env:
          VITE_FIREBASE_API_KEY: ${{ steps.firebase.outputs.api_key }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ steps.firebase.outputs.auth_domain }}
          VITE_FIREBASE_PROJECT_ID: ${{ steps.firebase.outputs.project_id }}
          VITE_API_BASE_URL: ${{ secrets.APP_API_BASE_URL }}
          VITE_DOCS_URL: ${{ secrets.APP_DOCS_URL }}

      - name: Build docs
        run: yarn install --frozen-lockfile && yarn build
        working-directory: docs

      # ── Phase 3: deploy frontend, then common (common references frontend) ──
      - name: Deploy frontend
        run: python iac/scripts/up.py --stack "${{ inputs.stack }}" --module frontend
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          APP_DIST_DIR: ${{ github.workspace }}/app/dist
          DOCS_DIST_DIR: ${{ github.workspace }}/docs/dist

      - name: Deploy common and aws-ns
        run: |
          for module in common aws-ns; do
            python iac/scripts/up.py --stack "${{ inputs.stack }}" --module "$module"
          done
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
