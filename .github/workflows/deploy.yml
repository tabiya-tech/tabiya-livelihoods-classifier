name: Deploy Infrastructure (Pulumi)

on:
  push:
    branches-ignore: [main]
    paths:
      - "backend/**"
      - "iac/**"
  workflow_dispatch:
    inputs:
      stack:
        description: "Pulumi stack to deploy (dev / staging / prod)"
        required: true
        default: dev
        type: choice
        options: [dev, staging, prod]
      ner_sha:
        description: "NER image git SHA (leave blank for current commit)"
        required: false
      nel_sha:
        description: "NEL image git SHA (leave blank for current commit)"
        required: false
      classify_sha:
        description: "Classify image git SHA (leave blank for current commit)"
        required: false

# ── Shared steps ─────────────────────────────────────────────────────────────
# Push trigger: only runs when commit message contains [deploy dev], always targets dev.
# workflow_dispatch: runs unconditionally, targets the selected stack.

env:
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tabiya-classifier

jobs:
  # Resolves which stack to deploy and gates push-triggered runs on [deploy dev]
  resolve:
    name: Resolve stack
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || contains(github.event.head_commit.message, '[deploy dev]')
    outputs:
      stack: ${{ steps.stack.outputs.value }}
    steps:
      - name: Set stack
        id: stack
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "value=dev" >> $GITHUB_OUTPUT
          else
            echo "value=${{ inputs.stack }}" >> $GITHUB_OUTPUT
          fi

  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: resolve
    environment: ${{ needs.resolve.outputs.stack }}
    strategy:
      matrix:
        service: [ner, nel, classify]
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: docker build -f backend/${{ matrix.service }}/Dockerfile -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

      - name: Output image URI
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY

  prepare:
    name: Prepare configs
    runs-on: ubuntu-latest
    needs: [resolve, build-and-push]
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Resolve image URIs
        id: images
        run: |
          NER_SHA="${{ inputs.ner_sha || github.sha }}"
          NEL_SHA="${{ inputs.nel_sha || github.sha }}"
          CLASSIFY_SHA="${{ inputs.classify_sha || github.sha }}"
          echo "ner=${{ env.REGISTRY }}/ner:${NER_SHA}" >> $GITHUB_OUTPUT
          echo "nel=${{ env.REGISTRY }}/nel:${NEL_SHA}" >> $GITHUB_OUTPUT
          echo "classify=${{ env.REGISTRY }}/classify:${CLASSIFY_SHA}" >> $GITHUB_OUTPUT

      - name: Install script dependencies
        run: pip install -r iac/scripts/requirements.txt

      - name: Fetch configs and secrets from GCP Secret Manager
        run: |
          python iac/scripts/prepare.py \
            --stack "${{ needs.resolve.outputs.stack }}" \
            --project "${{ secrets.GCP_PROJECT_ID }}" \
            --ner-image "${{ steps.images.outputs.ner }}" \
            --nel-image "${{ steps.images.outputs.nel }}" \
            --classify-image "${{ steps.images.outputs.classify }}"

      - name: Upload prepared configs
        uses: actions/upload-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}
          path: |
            iac/enable-services/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
            iac/dns/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
            iac/auth/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
            iac/backend/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
            iac/backend/.env.${{ needs.resolve.outputs.stack }}
            iac/common/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
            iac/aws-ns/Pulumi.${{ needs.resolve.outputs.stack }}.yaml
          retention-days: 1

  # ── Enable APIs (must run before all other stacks) ────────────────────────
  deploy-enable-services:
    name: Deploy enable-services
    needs: [resolve, prepare]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Pulumi deps
        working-directory: iac/enable-services
        run: pip install -r requirements.txt

      - name: pulumi up — enable-services
        working-directory: iac/enable-services
        run: pulumi up --stack "tabiya-tech/tabiya-classifier-enable-services/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── DNS ───────────────────────────────────────────────────────────────────
  deploy-dns:
    name: Deploy dns
    needs: [resolve, deploy-enable-services]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Pulumi deps
        working-directory: iac/dns
        run: pip install -r requirements.txt

      - name: pulumi up — dns
        working-directory: iac/dns
        run: pulumi up --stack "tabiya-tech/tabiya-classifier-dns/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Auth (runs after dns) ─────────────────────────────────────────────────
  deploy-auth:
    name: Deploy auth
    needs: [resolve, deploy-dns]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Pulumi deps
        working-directory: iac/auth
        run: pip install -r requirements.txt

      - name: pulumi up — auth
        working-directory: iac/auth
        run: pulumi up --stack "tabiya-tech/tabiya-classifier-auth/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Backend (runs after dns, parallel with auth) ──────────────────────────
  deploy-backend:
    name: Deploy backend
    needs: [resolve, deploy-dns]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Pulumi deps
        working-directory: iac/backend
        run: pip install -r requirements.txt

      - name: pulumi up — backend
        working-directory: iac/backend
        run: |
          set -a
          source ".env.${{ needs.resolve.outputs.stack }}"
          set +a
          pulumi up --stack "tabiya-tech/tabiya-classifier-backend/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── Common (needs dns + backend outputs) ──────────────────────────────────
  deploy-common:
    name: Deploy common
    needs: [resolve, deploy-dns, deploy-backend]
    runs-on: ubuntu-latest
    environment: ${{ needs.resolve.outputs.stack }}
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Install Pulumi deps
        working-directory: iac/common
        run: pip install -r requirements.txt

      - name: pulumi up — common
        working-directory: iac/common
        run: pulumi up --stack "tabiya-tech/tabiya-classifier-common/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

  # ── AWS NS (needs dns for nameservers, parallel with auth/backend/common) ─
  # AWS credentials are repository secrets (not environment) because Route 53
  # manages tabiya.tech which is shared across all environments.
  deploy-aws-ns:
    name: Deploy aws-ns
    needs: [resolve, deploy-dns]
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Download prepared configs
        uses: actions/download-artifact@v4
        with:
          name: pulumi-configs-${{ needs.resolve.outputs.stack }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Install Pulumi deps
        working-directory: iac/aws-ns
        run: pip install -r requirements.txt

      - name: pulumi up — aws-ns
        working-directory: iac/aws-ns
        run: pulumi up --stack "tabiya-tech/tabiya-classifier-aws-ns/${{ needs.resolve.outputs.stack }}" --yes --color always
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
