name: Build and Push Docker Images

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
  pull_request:
    branches: [main]
    paths:
      - "backend/**"

env:
  REGION: us-central1
  REGISTRY: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/tabiya-classifier

jobs:
  test:
    name: Run backend tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [ner, nel, classify]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pip install poetry==1.8.3

      - name: Install shared
        working-directory: backend/shared
        run: poetry install --no-root

      - name: Install ${{ matrix.service }} service
        working-directory: backend/${{ matrix.service }}
        run: poetry install

      - name: Run tests
        working-directory: backend/${{ matrix.service }}
        run: poetry run python -m pytest tests/ -v

  build-and-push:
    name: Build and push ${{ matrix.service }}
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [ner, nel, classify]
        include:
          - service: ner
            port: 5002
          - service: nel
            port: 5003
          - service: classify
            port: 5001
    permissions:
      contents: read
      id-token: write  # for Workload Identity Federation

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build Docker image
        run: |
          docker build \
            -f backend/${{ matrix.service }}/Dockerfile \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ matrix.service }}:latest \
            .

      - name: Push Docker image
        run: |
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ matrix.service }}:latest

      - name: Output image URI
        run: echo "IMAGE=${{ env.REGISTRY }}/${{ matrix.service }}:${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
