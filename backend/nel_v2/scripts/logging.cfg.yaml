version: 1
disable_existing_loggers: false

formatters:
  default:
    format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

handlers:
  tqdm_console:
    class: _logging_handler.TqdmLoggingHandler
    formatter: default
    stream: ext://sys.stdout

root:
  level: INFO
  handlers: [tqdm_console]
